<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Daily and Weekly SIP Plans for Government Exam Aspirants</title>
  <desc id="desc">Structured preparation plan slide showing daily and weekly SIP workflow for exam consistency</desc>
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#edf7ff"/>
      <stop offset="100%" stop-color="#dfedff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg3)"/>
  <rect x="90" y="90" width="1020" height="620" rx="28" fill="#ffffff" stroke="#d6e8ff" stroke-width="4"/>
  <text x="140" y="175" fill="#0f172a" font-size="52" font-family="Inter, Arial, sans-serif" font-weight="800">Daily &amp; Weekly SIP Plans</text>
  <text x="140" y="225" fill="#475569" font-size="26" font-family="Inter, Arial, sans-serif" font-weight="500">Stay consistent. Improve speed, accuracy, and rank.</text>
  <rect x="140" y="280" width="420" height="330" rx="18" fill="#f4faff" stroke="#d7ebff"/>
  <text x="175" y="335" fill="#0073e6" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="800">Daily SIP (45 mins)</text>
  <text x="175" y="385" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">15m concept revision</text>
  <text x="175" y="425" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">20m timed mock questions</text>
  <text x="175" y="465" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">10m mistake analysis</text>
  <rect x="640" y="280" width="420" height="330" rx="18" fill="#f4faff" stroke="#d7ebff"/>
  <text x="675" y="335" fill="#0073e6" font-size="32" font-family="Inter, Arial, sans-serif" font-weight="800">Weekly SIP (6 days)</text>
  <text x="675" y="385" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">4 full govt exam mocks</text>
  <text x="675" y="425" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">2 speed drills</text>
  <text x="675" y="465" fill="#334155" font-size="24" font-family="Inter, Arial, sans-serif">1 rank improvement review</text>
  <rect x="460" y="640" width="280" height="50" rx="12" fill="#0073e6"/>
  <text x="515" y="673" fill="#ffffff" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="700">Start SIP Plan</text>
</svg>
